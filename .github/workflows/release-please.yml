name: Release Please

# Maintains a rolling "chore: release to production (subgraph)" PR for changes
# under subgraph/. Merging that PR bumps the version
# (.release-please-manifest.json + subgraph/CHANGELOG.md), creates the
# v<version> tag / GitHub Release, and — in the same run — deploys versioned
# subgraphs to Goldsky (calibration + mainnet) and opens a release issue. The
# issue tracks indexing, verification, and promotion of both versions to `prod`.
#
# Deploy is gated on release-please's `release_created` output rather than a
# separate `on: push: tags` workflow, because tags created with GITHUB_TOKEN do
# not trigger other workflows (GitHub's recursion guard). Keeping deploy in this
# same run sidesteps that, so no PAT/App token is needed.
#
# Requires the GOLDSKY_API_KEY repository secret.

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs['subgraph--release_created'] }}
      version: ${{ steps.release.outputs['subgraph--version'] }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  deploy:
    name: Deploy subgraph to Goldsky (${{ matrix.network }})
    needs: release-please
    if: needs.release-please.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: subgraph
    strategy:
      matrix:
        network: [calibration, mainnet]
    env:
      # Endpoint scheme is pdp-explorer-<network>/<version>.
      VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: subgraph/package-lock.json

      - run: npm ci

      - name: Install Goldsky CLI
        run: curl -fsSL https://goldsky.com | sh -s -- -f

      - name: Build subgraph (${{ matrix.network }})
        run: NETWORK=${{ matrix.network }} npm run build

      - name: Deploy to Goldsky (${{ matrix.network }})
        env:
          GOLDSKY_API_KEY: ${{ secrets.GOLDSKY_API_KEY }}
        run: goldsky subgraph deploy "pdp-explorer-${{ matrix.network }}/$VERSION" --path . --token "$GOLDSKY_API_KEY"

  create-release-issue:
    name: Create release tracking issue
    needs: [release-please, deploy]
    # `always()` so this still runs (and the tracking issue still gets created)
    # even if the deploy job failed — the issue's own checklist is how a
    # release owner confirms deploy success, so skipping issue creation on
    # failure would remove the one artifact telling them a fix is needed.
    if: |
      always() &&
      needs.release-please.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v7

      - name: Create release issue
        uses: actions/github-script@v9
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
        with:
          script: |
            const createReleaseIssue = require('./.github/scripts/create-release-issue.js');
            await createReleaseIssue({ github, context, core });
