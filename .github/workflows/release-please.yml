name: Release Please

# Maintains a rolling "chore: release to production (subgraph)" PR for changes
# under subgraph/. Merging that PR bumps the version (in
# .release-please-manifest.json + subgraph/CHANGELOG.md) and creates the
# v<version> tag. The subgraph deploy workflow (to be added) will
# trigger off that tag.

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
