name: Web Client CI

on:
  pull_request:
    paths:
      - 'subgraph-client/**'
      - '.github/workflows/subgraph-client-ci.yml'
  push:
    branches: [main]
    paths:
      - 'subgraph-client/**'
      - '.github/workflows/subgraph-client-ci.yml'

concurrency:
  group: client-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: subgraph-client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: subgraph-client/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck & build
        run: npm run build
