name: Web Client CI

on:
  pull_request:
    paths:
      - 'subgraph-client/**'
      - '.github/workflows/subgraph-client-ci.yml'
  push:
    branches: [main]
    paths:
      - 'subgraph-client/**'
      - '.github/workflows/subgraph-client-ci.yml'

concurrency:
  group: client-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: subgraph-client
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: subgraph-client/package-lock.json

      - run: npm ci

      # Lint & format are handled repo-wide by Biome (.github/workflows/biome.yml).
      - name: Typecheck & build
        run: npm run build
