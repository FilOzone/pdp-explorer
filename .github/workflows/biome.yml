name: Biome

# Repo-wide formatting, import-sorting and lint gate (Biome). Config: biome.json.
# Build/test live in the per-package workflows; this one covers code style/lint
# across both subgraph/ and subgraph-client/ in a single fast pass.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: biome-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  biome:
    name: Format & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Biome CI
        run: npm run check:ci
