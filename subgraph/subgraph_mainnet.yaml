specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: PDPVerifier
    network: filecoin
    source:
      address: "0xBADd0B92C1c71d02E7d520f64c0876538fa2557F"
      abi: PDPVerifier
      startBlock: 5441432
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - DataSet
        - Provider
        - Root
        - SumTreeCount
        - Service
        - ServiceProviderLink
        - EventLog
        - Transaction
        - Proof
        - ProofFee
        - FaultRecord
      abis:
        - name: PDPVerifier
          file: ./abis/PDPVerifier.json
      eventHandlers:
        - event: DataSetCreated(indexed uint256,indexed address)
          handler: handleDataSetCreated
        - event: StorageProviderChanged(indexed uint256,indexed address,indexed address)
          handler: handleStorageProviderChanged
        - event: DataSetDeleted(indexed uint256,uint256)
          handler: handleDataSetDeleted
        - event: PiecesAdded(indexed uint256,uint256[],(bytes)[])
          handler: handlePiecesAdded
        - event: PiecesRemoved(indexed uint256,uint256[])
          handler: handlePiecesRemoved
        - event: ProofFeePaid(indexed uint256,uint256)
          handler: handleProofFeePaid
        - event: DataSetEmpty(indexed uint256)
          handler: handleDataSetEmpty
        - event: PossessionProven(indexed uint256,(uint256,uint256)[])
          handler: handlePossessionProven
        - event: NextProvingPeriod(indexed uint256,uint256,uint256)
          handler: handleNextProvingPeriod
      file: ./src/pdp-verifier.ts
  - kind: ethereum
    name: FilecoinWarmStorageService
    network: filecoin
    source:
      address: "0x8408502033C418E1bbC97cE9ac48E5528F371A9f"
      abi: FilecoinWarmStorageService
      startBlock: 5459617
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - DataSet
        - Root
      abis:
        - name: FilecoinWarmStorageService
          file: ./abis/FilecoinWarmStorageService.json
      eventHandlers:
        - event: DataSetCreated(indexed uint256,indexed uint256,uint256,uint256,uint256,address,address,address,string[],string[])
          handler: handleFwssDataSetCreated
        - event: PieceAdded(indexed uint256,indexed uint256,(bytes),string[],string[])
          handler: handleFwssPieceAdded
        - event: ServiceTerminated(indexed address,indexed uint256,uint256,uint256,uint256)
          handler: handleFwssServiceTerminated
        - event: PDPPaymentTerminated(indexed uint256,uint256,uint256)
          handler: handleFwssPdpPaymentTerminated
        - event: DataSetServiceProviderChanged(indexed uint256,indexed address,indexed address)
          handler: handleFwssDataSetServiceProviderChanged
      file: ./src/fwss.ts
